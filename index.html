<style>
  .canva-frame-container {

    overflow: hidden;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    margin: 1.5em 0;

  @media (max-width: 767px) {

    width: 100%;
